# 指定测试项目，分IPTV和OTT
project: OTT

device:
  # 测试设备和包名，用于通过adb获取信息
  id:
  package: com.mgtv.tv
#  id: 192.168.202.125:5555
#  package: com.hunantv.operator

# url中显示上报类型
display: on
# 显示原始数据
primitive: off
# 字段缺失校验
lack: off
# 接口请求参数排序
sort: on


OTT:
  common:
    # 公共字段
    time: time_compare-14
    sessionid: empty_compare
    did: a760a60cace7
    newdid: len_compare-36
