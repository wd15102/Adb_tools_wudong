    aver: 6.2.501.633.3.HWHMSDK_TVSDK.0.0_Debug
    ver: ver_compare
    patchid: empty_compare
    lics: empty_compare
    uvip: uvip_compare
    ot: '1'
    abt: inter_compare
  #  src: 'mgtv'
    caplayer: '1'
  #  paid: inter_compare
    agemod: '0'
    localip: localip_compare
    pver: empty_compare

    # apm上报
    app_version: ver_compare
