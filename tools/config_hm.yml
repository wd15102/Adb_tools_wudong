  # 忽略字段
  ignore:
    - package
    - osver
    - asid
    - logtype
    - act
    - cpn
    - fpn
    - bdsv
    - _json

  # 字段名不同
  alias:
    clipId:
      - plid
      - oplid
      - soplid
    # 不能与clipId统一，bdid等会错误赋值
    plId:
      - bdid
      - oplid
      - plid
    seriesId:
      - bsid
    videoId:
      - vid
      - ovid
      - sovid
    # 短视频
    topicId:
      - cid
    subTopicId:
      - oplid
      - plid
    partId:
      - vid
      - ovid

    duration:
      - vtsd
    fstlvlId:
      - cid
    guid:
      - sessionid
    isIntact:
      - cf
    os_ver:
      - sver
    quality:
      - def
    version:
      - ver
      - aver
    url:
      - purl
    cntp:
      - cpn
    isVip:
      - uvip
    type:
      - protype
    channelId:
      - mclassid
    mod:
      - model

